services:
  - type: web
    name: tilt-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn tilt.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # PYTHON_VERSION pins the interpreter. Required because Render defaults
      # to its newest installed Python (3.14 as of May 2026), and numba — a
      # transitive dep of pandas-ta 0.4.x — only supports up to 3.13. The
      # legacy `runtime.txt` file is ignored when a render.yaml is present.
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: PORTFOLIO_PROVIDER
        value: mock
        # Switch to `groww` at step 17 after credentials are set on Render.
      - key: GROWW_API_KEY
        sync: false
        # `sync: false` keeps the value out of the rendered YAML; set per-env
        # in the Render dashboard. Empty is fine while PORTFOLIO_PROVIDER=mock.
      - key: GROWW_API_SECRET
        sync: false
      - key: MARKET_DATA_PROVIDER
        value: yfinance
      - key: PYTHONUNBUFFERED
        value: "1"
