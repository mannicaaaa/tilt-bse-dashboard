<meta charset="UTF-8" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: {
            900: '#0A0A0B', 800: '#101013', 700: '#16161A',
            600: '#1C1C21', 500: '#23232A', 400: '#2D2D36',
          },
          line: { DEFAULT: '#23232A', soft: '#1C1C21', strong: '#2D2D36' },
          fg: { DEFAULT: '#F4F4F5', muted: '#A1A1AA', dim: '#71717A', faint: '#52525B' },
          bull: { DEFAULT: '#22D3A4', soft: 'rgba(34,211,164,0.12)' },
          bear: { DEFAULT: '#F87171', soft: 'rgba(248,113,113,0.12)' },
          warn: { DEFAULT: '#FBBF24', soft: 'rgba(251,191,36,0.12)' },
          laneStrong:   '#22D3A4',
          laneMomentum: '#7DD3FC',
          laneValue:    '#FBBF24',
        },
        borderRadius: { card: '12px' },
        boxShadow: {
          card: '0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,0.6)',
          lift: '0 8px 24px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3)',
        },
      },
    },
  };
</script>
<style>
  html, body { background: #0A0A0B; color: #F4F4F5; }
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2D2D36; border-radius: 8px; border: 2px solid #0A0A0B; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a44; }
  html.light, html.light body { background: #FAFAFA; color: #18181B; }

  @keyframes tiltFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .tilt-fade { animation: tiltFade 220ms ease-out both; }
  @keyframes tiltSpin { to { transform: rotate(360deg); } }
  .tilt-spin { animation: tiltSpin 0.9s linear infinite; }
  @keyframes tiltPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .tilt-pulse { animation: tiltPulse 1.6s ease-in-out infinite; }
  .ring-focus:focus-visible { outline: 2px solid #22D3A4; outline-offset: 2px; }
  table { border-collapse: separate; border-spacing: 0; }

  .lane-strong   { --lane: #22D3A4; --lane-soft: rgba(34,211,164,0.14); }
  .lane-momentum { --lane: #7DD3FC; --lane-soft: rgba(125,211,252,0.14); }
  .lane-value    { --lane: #FBBF24; --lane-soft: rgba(251,191,36,0.14); }
</style>
</head>
<body class="font-sans">
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <!-- Live API base — flip to local during dev: http://localhost:8000 -->
