<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tilt — Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* DARK (default) — derived from brief: bg #0A0A0B, cards #16161A, fg #F4F4F5 */
    --bg: #0A0A0B;
    --bg-elev: #111114;
    --bg-card: #16161A;
    --bg-card-hover: #1C1C22;
    --fg: #F4F4F5;
    --fg-muted: #9A9AA3;
    --fg-faint: #5E5E68;
    --border: #232329;
    --border-strong: #2E2E36;
  }

  body.light {
    --bg: #FAFAFA;
    --bg-elev: #F2F2F4;
    --bg-card: #FFFFFF;
    --bg-card-hover: #F6F6F8;
    --fg: #14141A;
    --fg-muted: #5A5A66;
    --fg-faint: #95959E;
    --border: #E5E5EA;
    --border-strong: #D4D4D9;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "cv11", "ss01";
    transition: background 0.2s, color 0.2s;
  }

  /* Subtle scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 999px;
    border: 2px solid var(--bg);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-faint); }

  button { font-family: inherit; }

  /* tabular numerals on all mono — for clean column alignment */
  [style*="JetBrains Mono"] { font-variant-numeric: tabular-nums; }

  @keyframes tilt-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes tilt-slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data + helpers (plain JS, not babel) -->
<script src="data.js"></script>

<!-- Tweaks shell -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Components -->
<script type="text/babel" src="components/icon.jsx"></script>
<script type="text/babel" src="components/lane-tag.jsx"></script>
<script type="text/babel" src="components/top-nav.jsx"></script>
<script type="text/babel" src="components/market-read.jsx"></script>
<script type="text/babel" src="components/hero-pick.jsx"></script>
<script type="text/babel" src="components/supporting-pick.jsx"></script>
<script type="text/babel" src="components/sector-strip.jsx"></script>
<script type="text/babel" src="components/portfolio-sidebar.jsx"></script>
<script type="text/babel" src="components/stock-detail.jsx"></script>

<!-- App -->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
